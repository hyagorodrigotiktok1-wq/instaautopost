name: Post Scheduled Reels

on:
  workflow_dispatch:

concurrency:
  group: poster
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python poster.py
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTA_ACCOUNT_CONSERVADORA_TOKEN: ${{ secrets.INSTA_ACCOUNT_CONSERVADORA_TOKEN }}
          INSTA_ACCOUNT_CONSERVADORA_USER_ID: ${{ secrets.INSTA_ACCOUNT_CONSERVADORA_USER_ID }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Commit status updates
        run: |
          git config user.name "InstaAutoPost"
          git config user.email "bot@instaautopost.local"
          git add data/posts.json data/logs.json data/analytics.json data/archive.json
          git diff --cached --quiet && exit 0
          git commit -m "update post statuses [bot]"
          for i in 1 2 3; do
            git push && exit 0
            echo "Push falhou (tentativa $i/3), fazendo pull --rebase..."
            git pull --rebase origin master
          done
          echo "Push falhou apos 3 tentativas"
          exit 1
