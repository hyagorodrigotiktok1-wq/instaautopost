name: Post Scheduled Reels

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python poster.py
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTA_ACCOUNT_CONSERVADORA_TOKEN: ${{ secrets.INSTA_ACCOUNT_CONSERVADORA_TOKEN }}
          INSTA_ACCOUNT_CONSERVADORA_USER_ID: ${{ secrets.INSTA_ACCOUNT_CONSERVADORA_USER_ID }}

      - name: Commit status updates
        run: |
          git config user.name "InstaAutoPost"
          git config user.email "bot@instaautopost.local"
          git add data/posts.json
          git diff --cached --quiet || git commit -m "update post statuses [bot]"
          git push
